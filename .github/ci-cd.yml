name: FAZ ETL Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install pandas pyarrow sqlalchemy python-dotenv requests pytest pytest-cov ruff

      - name: Linting
        run: ruff check etl/ dags/ --ignore E501

      - name: Tests
        run: pytest tests/ -v